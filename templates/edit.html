{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-lg border-0 p-4 p-md-5">
            <h2 class="fw-bold mb-4"><i class="fa-solid fa-pen-to-square me-2"></i>게시글 수정</h2>

            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-4">
                    <label class="form-label fw-bold">카테고리 선택</label>
                    <select name="category" class="form-select p-3 bg-light border-0 rounded-3" required>
                        {% if is_admin %}
                        <option value="공지사항" {% if post.category == '공지사항' %}selected{% endif %}>📢 공지사항 (관리자 전용)</option>
                        {% endif %}
                        <option value="자유게시판" {% if post.category == '자유게시판' %}selected{% endif %}>💬 자유게시판</option>
                        <option value="학습/질문" {% if post.category == '학습/질문' %}selected{% endif %}>📖 학습/질문</option>
                        <option value="동아리/MT" {% if post.category == '동아리/MT' %}selected{% endif %}>🍻 동아리/MT</option>
                        <option value="건의사항" {% if post.category == '건의사항' %}selected{% endif %}>💡 건의사항</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">제목</label>
                    <input type="text" name="title" class="form-control p-3 bg-light border-0 rounded-3"
                           value="{{ post.title }}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">내용</label>
                    <textarea name="content" class="form-control p-3 bg-light border-0 rounded-3"
                              rows="10" required>{{ post.content }}</textarea>
                </div>

                <!-- 사진 첨부 -->
                <div class="mb-4">
                    <label class="form-label fw-bold">
                        <i class="fa-solid fa-image me-2"></i>사진 첨부 <span class="text-muted fw-normal small">(선택, PNG/JPG/JPEG/GIF · 최대 5MB)</span>
                    </label>
                    {% if post.image_path %}
                    <div class="mb-2 small text-muted">현재 첨부된 이미지: <a href="{{ post.image_path }}" target="_blank">보기</a> <br>(새 이미지를 업로드하면 기존 이미지가 교체됩니다.)</div>
                    {% endif %}
                    <input type="file" id="post_image" name="post_image"
                           class="form-control bg-light border-0 rounded-3 p-3"
                           accept=".png,.jpg,.jpeg,.gif">
                    <!-- 미리보기 -->
                    <div id="img-preview-wrap" class="mt-3 {% if not post.image_path %}d-none{% endif %}">
                        <img id="img-preview" src="{% if post.image_path %}{{ post.image_path }}{% else %}#{% endif %}" alt="미리보기"
                             style="max-width:100%; max-height:300px; object-fit:contain; border-radius:10px; border:1px solid #eee;">
                        <div class="mt-1">
                            <button type="button" class="btn btn-sm btn-outline-danger rounded-pill mt-1" onclick="clearImage()">
                                <i class="fa-solid fa-xmark me-1"></i>이미지 제거 (취소)
                            </button>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-5">
                    <a href="{{ url_for('view', post_id=post.id) }}" class="btn btn-light flex-fill py-3 rounded-pill fw-bold">취소</a>
                    <button type="submit" class="btn btn-primary flex-fill py-3 rounded-pill fw-bold shadow-sm">수정 완료</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
const imgInput = document.getElementById('post_image');
const previewWrap = document.getElementById('img-preview-wrap');
const previewImg  = document.getElementById('img-preview');
const MAX_SIZE    = 5 * 1024 * 1024; // 5MB
const ALLOWED     = ['image/png', 'image/jpeg', 'image/gif'];
const originalSrc = previewImg.src;

imgInput.addEventListener('change', function() {
    const file = this.files[0];
    if (!file) { clearImage(); return; }

    if (!ALLOWED.includes(file.type)) {
        alert('PNG, JPG, JPEG, GIF 형식만 업로드할 수 있습니다.');
        clearImage(); return;
    }
    if (file.size > MAX_SIZE) {
        alert('파일 용량이 5MB를 초과합니다.');
        clearImage(); return;
    }

    const reader = new FileReader();
    reader.onload = e => {
        previewImg.src = e.target.result;
        previewWrap.classList.remove('d-none');
    };
    reader.readAsDataURL(file);
});

function clearImage() {
    imgInput.value = '';
    // 만약 기존 이미지가 있었다면, 파일 선택 취소 시 원래 이미지 경로로 돌아감
    if ("{{ post.image_path }}" !== "None" && "{{ post.image_path }}" !== "") {
        previewImg.src = originalSrc;
        previewWrap.classList.remove('d-none');
    } else {
        previewImg.src = '#';
        previewWrap.classList.add('d-none');
    }
}
</script>
{% endblock %}
