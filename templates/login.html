{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">

        <!-- 승인 대기 안내 메시지 -->
        {% if pending_user %}
        <div class="alert border-0 rounded-3 mb-4 py-4 px-4 shadow-sm" style="background:#f7fffb; border-left:5px solid var(--dept-green) !important;">
            <h6 class="fw-bold mb-2" style="color:var(--dept-green);">
                <i class="fa-solid fa-hourglass-half me-2"></i>가입 승인 대기 중
            </h6>
            <p class="mb-0 small text-muted">
                현재 과대(관리자)가 학생 인증을 확인 중입니다.<br>
                캡처본을 올리지 않으셨다면
                <a href="{{ url_for('verify') }}" class="fw-bold" style="color:var(--dept-green);">[여기]를 눌러 다시 업로드</a>해 주세요.
            </p>
        </div>
        {% endif %}

        <div class="card shadow-lg border-0 p-4">
            <div class="text-center mb-4">
                <h2 class="fw-bold" style="color: var(--dept-green);">로그인</h2>
                <p class="text-muted">PNU CSE 26학번 전용 소통 공간</p>
            </div>
            
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label fw-bold">아이디</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                        <input type="text" name="username" class="form-control border-start-0" placeholder="아이디" required autofocus>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">비밀번호</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control border-start-0" placeholder="비밀번호" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 btn-lg py-3 fw-bold mb-3 shadow-sm">로그인</button>
                
                <div class="d-flex justify-content-between mt-3 small">
                    <div>
                        <a href="{{ url_for('find_id') }}" class="text-muted text-decoration-none">아이디 찾기</a>
                        <span class="mx-1">|</span>
                        <a href="{{ url_for('forgot_password') }}" class="text-muted text-decoration-none">비밀번호 재설정</a>
                    </div>
                    <a href="{{ url_for('signup') }}" class="fw-bold text-decoration-none" style="color: var(--dept-green);">회원가입</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
