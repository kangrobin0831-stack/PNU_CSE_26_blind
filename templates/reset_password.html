{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 p-4">
            <div class="text-center mb-4">
                <h2 class="fw-bold" style="color: var(--dept-green);">새 비밀번호 설정</h2>
                <p class="text-muted">사용하실 새로운 비밀번호를 입력해 주세요.</p>
            </div>
            
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-4">
                    <label class="form-label fw-bold">새 비밀번호</label>
                    <input type="password" name="password" class="form-control form-control-lg shadow-sm" placeholder="새 비밀번호 입력" required autofocus>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 btn-lg py-3 fw-bold mb-3 shadow-sm">비밀번호 변경 완료</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
